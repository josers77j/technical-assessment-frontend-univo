@if(alertState() !== ALERT_STATE.IDLE){
<div
    role="alert"
    class="fixed z-50 animate-fadeIn
    bottom-20 inset-x-0 px-4
    sm:right-6 sm:left-auto sm:px-0">
    <div class="alert alert-soft shadow-xl w-full sm:w-90  {{alertClass()}}">
        <span>{{alertMessage()}}</span>
    </div>
</div>
}
