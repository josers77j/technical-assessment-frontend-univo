<div class="drawer lg:drawer-open min-h-screen">
  <input #drawerToggle id="my-drawer-4" type="checkbox" class="drawer-toggle" />
  <div class="drawer-content">
    <!-- Navbar -->
    <nav class="navbar w-full bg-base-300 fixed z-999">
      <label for="my-drawer-4" aria-label="open sidebar" class="btn btn-square btn-ghost lg:hidden">
        <span class="icon-[mynaui--sidebar] text-2xl"></span>
      </label>

      <div class="px-4 text-2xl">
            Test
      </div>
    </nav>
    <!-- Page content here -->
    <div class="p-4 mt-15">
      <router-outlet></router-outlet>
    </div>

  </div>

  <div class="drawer-side is-drawer-close:overflow-visible">
    <label for="my-drawer-4" aria-label="close sidebar" class="drawer-overlay"></label>
    <div
      class="flex  flex-col items-start bg-base-300 is-drawer-close:w-15 is-drawer-open:w-65 min-h-screen overflow-hidden
  lg:is-drawer-close:overflow-visible ">

      <!-- button toggle here -->
      <div class="menu bg-base-300 w-full flex px-3">
        <label for="my-drawer-4" aria-label="open sidebar" class="btn btn-square btn-ghost">
          <!-- Sidebar toggle icon -->
          <span class="icon-[mynaui--sidebar] text-2xl"></span>
        </label>
      </div>

      <!-- Sidebar content here -->
      <ul class="menu bg-base-300 w-full flex-1  gap-1">
        <!-- List item -->
        <li>
          <button routerLink="/products"
            routerLinkActive="bg-info text-info-content"
            class=" is-drawer-close:tooltip is-drawer-close:tooltip-right flex items-center gap-3 h-12"
            data-tip="Productos"
            (click)="closeDrawerIfMobile(drawerToggle)">
            <!-- Settings icon -->
            <span class="icon-[fluent-mdl2--product] text-2xl"></span>
            <span
              class="
              is-drawer-close:hidden
              text-xl
               whitespace-nowrap animate-fadeIn
                duration-50
                delay-50">
              Productos
            </span>
          </button>
        </li>

                <li>
          <button routerLink="/providers"
            routerLinkActive="bg-info text-info-content"
            class=" is-drawer-close:tooltip is-drawer-close:tooltip-right flex items-center gap-3 h-12"
            data-tip="Proveedores"
            (click)="closeDrawerIfMobile(drawerToggle)">
            <!-- Settings icon -->
           <span class="icon-[material-symbols--support] text-2xl"></span>
            <span
              class="
              is-drawer-close:hidden
              text-xl
               whitespace-nowrap animate-fadeIn
                duration-50
                delay-50">
              Proveedores
            </span>
          </button>
        </li>

        <!-- List item -->
      </ul>


    </div>
  </div>
</div>
